spark_detection:
  # HSV thresholds for capturing brilliant white-yellow-orange spark cores
  hsv_lower_1: [0, 80, 200]
  hsv_upper_1: [30, 255, 255]
  hsv_lower_2: [150, 80, 200]
  hsv_upper_2: [180, 255, 255]
  
  # Structural constraints to eliminate large blocks of glare (headlights/signs)
  min_spark_area: 4       # Minimum pixel area for a valid spark seed
  max_spark_area: 1200     # Maximum pixel area to filter out massive headlight blobs
  min_solidity: 0.3        # Sparks are irregular; avoids highly uniform circular glares
  brightness_threshold: 220 # V-channel minimum threshold

deduplication:
  similarity_threshold: 0.85 # Hamming distance ratio for perceptual hashing

processing:
  frame_sampling_rate: 1     # Process every frame (1) or skip frames (>1)
  output_format: "jpg"      # "jpg" or "png"